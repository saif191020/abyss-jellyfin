name: build-installer

on:
  push:
    paths:
      - 'setup.ps1'
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Cache PS2EXE
        id: cache-ps2exe
        uses: actions/cache@v4.2.2
        with:
          path: C:\Users\runneradmin\Documents\PowerShell\Modules\ps2exe
          key: ps2exe-module-${{ runner.os }}

      - name: Install PS2EXE
        if: steps.cache-ps2exe.outputs.cache-hit != 'true'
        run: Install-Module ps2exe -Force -Scope CurrentUser
        shell: pwsh

      - name: Get version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" -Headers $headers -ErrorAction SilentlyContinue
            $tag = if ($release) { $release.tag_name -replace '^v', '' } else { "0.0.0" }
          }
          $parts = $tag.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $version = $parts[0..3] -join '.'
          $shortVersion = $parts[0..2] -join '.'
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "SHORT_VERSION=$shortVersion" >> $env:GITHUB_OUTPUT
          echo "FILE_NAME=abyss-setup-v$shortVersion.exe" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build abyss-setup.exe
        run: |
          Invoke-PS2EXE `
            -InputFile .\setup.ps1 `
            -OutputFile .\${{ steps.version.outputs.FILE_NAME }} `
            -Title "Abyss Theme Setup" `
            -Description "Installer for Abyss - a clean minimal Jellyfin theme" `
            -Company "AumGupta" `
            -Product "Abyss" `
            -Version "${{ steps.version.outputs.VERSION }}" `
            -IconFile ".\docs\assets\favicon\favicon.ico" `
            -NoConsole:$false
        shell: pwsh

      - name: Upload to latest release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.SHORT_VERSION }}
          files: ${{ steps.version.outputs.FILE_NAME }}
          fail_on_unmatched_files: true

      - name: Upload to new release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.FILE_NAME }}
          fail_on_unmatched_files: true