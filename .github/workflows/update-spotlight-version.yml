name: update-spotlight-version

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Inject version into spotlight.html
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          sed -i "s/const ABYSS_SPOTLIGHT_VERSION = '[^']*'/const ABYSS_SPOTLIGHT_VERSION = '${VERSION}'/" \
            scripts/spotlight/spotlight.html
          echo "Set version to ${VERSION}"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/spotlight/spotlight.html
          git diff --staged --quiet || git commit -m "chore: bump spotlight version to ${{ github.ref_name }}"
          git push